<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – LuxeStay</title>
  <meta name="description" content="Login to your LuxeStay account to manage your hotel bookings."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div id="page-loader"><div class="logo-text">LuxeStay</div><div class="spinner"></div></div>

<div class="auth-page">
  <div class="auth-card reveal">
    <div class="auth-logo"><i class="fas fa-hotel"></i> LuxeStay</div>
    <div class="auth-subtitle">Welcome back! Sign in to your account</div>
    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="loginEmail"><i class="fas fa-envelope"></i> Email Address</label>
        <input class="form-control" type="email" id="loginEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
        <input class="form-control" type="password" id="loginPassword" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
    </form>
    <hr class="divider"/>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one →</a>
    </div>
    <div class="auth-footer" style="margin-top:0.5rem;">
      <a href="index.html" style="color:var(--text-secondary);"><i class="fas fa-arrow-left"></i> Back to Hotels</a>
    </div>
    <!-- Demo credentials hint -->
    <div style="margin-top:1.5rem;padding:1rem;background:var(--accent-dim);border:1px solid rgba(79,142,247,0.2);border-radius:var(--radius-md);font-size:0.8rem;color:var(--text-secondary);">
      <strong style="color:var(--accent);">Demo Credentials</strong><br/>
      Admin: admin@hotel.com / admin123<br/>
      User: john@example.com / john123
    </div>
  </div>
</div>

  <div id="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
