<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – LuxeStay</title>
  <meta name="description" content="Create your LuxeStay account and start booking premium hotels today."/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="page-loader"><div class="logo-text">LuxeStay</div><div class="spinner"></div></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🏨 LuxeStay</div>
    <div class="auth-subtitle">Create your account and start exploring</div>
    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input class="form-control" type="text" id="regName" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <input class="form-control" type="email" id="regEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input class="form-control" type="password" id="regPassword" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label for="regConfirm">Confirm Password</label>
        <input class="form-control" type="password" id="regConfirm" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account</button>
    </form>
    <hr class="divider"/>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
